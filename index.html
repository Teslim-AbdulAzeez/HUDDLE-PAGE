<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Huddle Page</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- PAGE LOGO -->
    <header>
      <div class="logo_container">
        <img src="./images/logo.svg" alt="Huddle logo" class="logo" />
      </div>
    </header>

    <!-- MAIN CONTENT -->
    <div class="main_container">
      <div class="main_image">
        <img src="./images/illustration-mockups.svg" alt="Huddle mockups" />
      </div>
      <div class="main_container_content">
        <h1>Build The Community Your Fans Will Love</h1>
        <p>
          Huddle re-imagines the way we build communities. You have a voice, but
          so does your audience. Create connections with your users as you
          engage in genuine discussion.
        </p>
        <button type="submit" class="btn">
          <a href="#" class="register_btn">Register</a>
        </button>
      </div>
    </div>

    <!-- SOCIALS -->
    <div class="socials">
      <span class="facebook_icon"><i class="fa-brands fa-facebook-f"></i></span>
      <span class="twitter_icon"><i class="fa-brands fa-twitter"></i></span>
      <span class="instagram_icon"><i class="fa-brands fa-instagram"></i></span>
    </div>
  </body>
</html>
